name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
        with:
          components: rustfmt, clippy
      - name: Run verification
        run: |
          cargo fmt --check
          cargo test --workspace
          cargo clippy --workspace -- -D warnings

  build-tools:
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            build: cargo
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            build: cargo
            linux_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            build: cargo
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            build: cargo
          - target: x86_64-pc-windows-msvc
            os: ubuntu-latest
            archive: zip
            build: xwin
          - target: aarch64-pc-windows-msvc
            os: ubuntu-latest
            archive: zip
            build: xwin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Install Linux cross linker
        if: ${{ matrix.linux_cross == true }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
      - name: Install cargo-xwin
        if: ${{ matrix.build == 'xwin' }}
        run: cargo install cargo-xwin --locked
      - name: Run tools clippy
        run: |
          if [ "${{ matrix.build }}" = "xwin" ]; then
            RUSTFLAGS='-C target-feature=+crt-static' cargo xwin clippy --release --target ${{ matrix.target }} -p rcwctl -p rcw-server -- -D warnings
          else
            cargo clippy --release --target ${{ matrix.target }} -p rcwctl -p rcw-server -- -D warnings
          fi
      - name: Build tools
        run: |
          if [ "${{ matrix.build }}" = "xwin" ]; then
            RUSTFLAGS='-C target-feature=+crt-static' cargo xwin build --release --target ${{ matrix.target }} -p rcwctl -p rcw-server
          else
            cargo build --release --target ${{ matrix.target }} -p rcwctl -p rcw-server
          fi
      - name: Package tools
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          package="rcw-tools-${target}"
          exe=""
          if [[ "$target" == *"windows"* ]]; then
            exe=".exe"
          fi

          rm -rf dist
          mkdir -p "dist/${package}" dist/release
          cp "target/${target}/release/rcwctl${exe}" "dist/${package}/"
          cp "target/${target}/release/rcw-server${exe}" "dist/${package}/"
          cp README.md CHANGELOG.md LICENSE "dist/${package}/"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && python3 -m zipfile -c "release/${package}.zip" "${package}")
          else
            tar -C dist -czf "dist/release/${package}.tar.gz" "${package}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: rcw-tools-${{ matrix.target }}
          path: dist/release/*
          if-no-files-found: error

  build-host:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Install cargo-xwin
        run: cargo install cargo-xwin --locked
      - name: Run host clippy
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo xwin clippy --release --target ${{ matrix.target }} -p rcw-host -- -D warnings
      - name: Build host
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo xwin build --release --target ${{ matrix.target }} -p rcw-host
      - name: Package host
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          package="rcw-host-${target}"
          rm -rf dist
          mkdir -p "dist/${package}" dist/release
          cp "target/${target}/release/rcw-host.exe" "dist/${package}/"
          cp README.md CHANGELOG.md LICENSE "dist/${package}/"
          (cd dist && python3 -m zipfile -c "release/${package}.zip" "${package}")
      - uses: actions/upload-artifact@v4
        with:
          name: rcw-host-${{ matrix.target }}
          path: dist/release/*
          if-no-files-found: error

  publish:
    needs:
      - build-tools
      - build-host
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi
      - uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true
      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist/release
          sha256sum *.tar.gz *.zip > checksums.txt
          cat checksums.txt
      - name: Create GitHub release
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" \
            dist/release/*.tar.gz \
            dist/release/*.zip \
            dist/release/checksums.txt \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --notes "Automated release for $RELEASE_TAG."
