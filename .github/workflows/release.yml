name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.2"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Run verification
        run: |
          cargo fmt --check
          cargo test --workspace
          cargo clippy --workspace -- -D warnings

  build-tools:
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            build: cargo
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            build: cargo
            linux_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            build: cargo
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            build: cargo
          - target: x86_64-pc-windows-msvc
            os: ubuntu-latest
            archive: zip
            build: xwin
          - target: aarch64-pc-windows-msvc
            os: ubuntu-latest
            archive: zip
            build: xwin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Install Linux cross linker
        if: ${{ matrix.linux_cross == true }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
      - name: Install cargo-xwin
        if: ${{ matrix.build == 'xwin' }}
        run: cargo install cargo-xwin --locked
      - name: Run tools clippy
        run: |
          if [ "${{ matrix.build }}" = "xwin" ]; then
            RUSTFLAGS='-C target-feature=+crt-static' cargo xwin clippy --release --target ${{ matrix.target }} -p rcwctl -p rcw-server -- -D warnings
          else
            cargo clippy --release --target ${{ matrix.target }} -p rcwctl -p rcw-server -- -D warnings
          fi
      - name: Build tools
        run: |
          if [ "${{ matrix.build }}" = "xwin" ]; then
            RUSTFLAGS='-C target-feature=+crt-static' cargo xwin build --release --target ${{ matrix.target }} -p rcwctl -p rcw-server
          else
            cargo build --release --target ${{ matrix.target }} -p rcwctl -p rcw-server
          fi
      - name: Package tools
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          package="rcw-tools-${target}"
          exe=""
          if [[ "$target" == *"windows"* ]]; then
            exe=".exe"
          fi

          rm -rf dist
          mkdir -p "dist/${package}" dist/release
          cp "target/${target}/release/rcwctl${exe}" "dist/${package}/"
          cp "target/${target}/release/rcw-server${exe}" "dist/${package}/"
          cp README.md CHANGELOG.md LICENSE "dist/${package}/"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && python3 -m zipfile -c "release/${package}.zip" "${package}")
          else
            tar -C dist -czf "dist/release/${package}.tar.gz" "${package}"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: rcw-tools-${{ matrix.target }}
          path: dist/release/*
          if-no-files-found: error

  build-host:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Install cargo-xwin
        run: cargo install cargo-xwin --locked
      - name: Run host clippy
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo xwin clippy --release --target ${{ matrix.target }} -p rcw-host -- -D warnings
      - name: Build host
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo xwin build --release --target ${{ matrix.target }} -p rcw-host
      - name: Package host
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          package="rcw-host-${target}"
          rm -rf dist
          mkdir -p "dist/${package}" dist/release
          cp "target/${target}/release/rcw-host.exe" "dist/${package}/"
          cp README.md CHANGELOG.md LICENSE "dist/${package}/"
          (cd dist && python3 -m zipfile -c "release/${package}.zip" "${package}")
      - uses: actions/upload-artifact@v7
        with:
          name: rcw-host-${{ matrix.target }}
          path: dist/release/*
          if-no-files-found: error

  publish:
    needs:
      - build-tools
      - build-host
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi
      - uses: actions/download-artifact@v8
        with:
          path: dist/release
          merge-multiple: true
      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist/release
          sha256sum *.tar.gz *.zip > checksums.txt
          cat checksums.txt
      - name: Generate release notes
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          notes_file="dist/release/RELEASE_NOTES.md"
          awk -v version="$version" '
            /^## / {
              heading = $0
              sub(/^## /, "", heading)
              if (in_section) {
                exit
              }
              if (heading == version || index(heading, version " ") == 1) {
                in_section = 1
                found = 1
                print
                next
              }
            }
            in_section {
              print
            }
            END {
              if (!found) {
                exit 42
              }
            }
          ' CHANGELOG.md > "$notes_file"
          if [ ! -s "$notes_file" ]; then
            echo "No changelog section found for $RELEASE_TAG" >&2
            exit 1
          fi
          cat "$notes_file"
      - name: Create GitHub release
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file dist/release/RELEASE_NOTES.md
            gh release upload "$RELEASE_TAG" \
              dist/release/*.tar.gz \
              dist/release/*.zip \
              dist/release/checksums.txt \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              dist/release/*.tar.gz \
              dist/release/*.zip \
              dist/release/checksums.txt \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG" \
              --notes-file dist/release/RELEASE_NOTES.md
          fi

  publish-npm:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi
      - name: Check npm package
        working-directory: npm
        run: |
          node <<'NODE'
          const pkg = require("./package.json");
          const tag = process.env.RELEASE_TAG;
          const expected = tag.replace(/^v/, "");
          if (pkg.version !== expected) {
            console.error(`npm package version ${pkg.version} does not match release tag ${tag}`);
            process.exit(1);
          }
          NODE
          npm test
          npm run pack:check
      - uses: actions/download-artifact@v8
        with:
          path: dist/release
          merge-multiple: true
      - name: Stage npm packages
        run: |
          set -euo pipefail
          rm -rf dist/npm
          mkdir -p dist/npm

          stage_package() {
            target="$1"
            package_dir="$2"
            archive="$3"
            binary="$4"

            temp_dir="$(mktemp -d)"
            if [[ "$archive" == *.tar.gz ]]; then
              tar -xzf "dist/release/$archive" -C "$temp_dir"
            else
              python3 -m zipfile -e "dist/release/$archive" "$temp_dir"
            fi

            mkdir -p "dist/npm/$package_dir/bin"
            cp "npm/packages/$package_dir/package.json" "dist/npm/$package_dir/package.json"
            cp "npm/packages/$package_dir/README.md" "dist/npm/$package_dir/README.md"
            cp "$temp_dir/rcw-tools-$target/$binary" "dist/npm/$package_dir/bin/$binary"
            chmod 755 "dist/npm/$package_dir/bin/$binary"
            rm -rf "$temp_dir"
          }

          stage_package x86_64-unknown-linux-gnu linux-x64 rcw-tools-x86_64-unknown-linux-gnu.tar.gz rcwctl
          stage_package aarch64-unknown-linux-gnu linux-arm64 rcw-tools-aarch64-unknown-linux-gnu.tar.gz rcwctl
          stage_package x86_64-apple-darwin darwin-x64 rcw-tools-x86_64-apple-darwin.tar.gz rcwctl
          stage_package aarch64-apple-darwin darwin-arm64 rcw-tools-aarch64-apple-darwin.tar.gz rcwctl
          stage_package x86_64-pc-windows-msvc win32-x64 rcw-tools-x86_64-pc-windows-msvc.zip rcwctl.exe
          stage_package aarch64-pc-windows-msvc win32-arm64 rcw-tools-aarch64-pc-windows-msvc.zip rcwctl.exe
      - name: Check staged npm packages
        run: |
          set -euo pipefail
          npm pack --dry-run ./dist/npm/linux-x64
          npm pack --dry-run ./dist/npm/linux-arm64
          npm pack --dry-run ./dist/npm/darwin-x64
          npm pack --dry-run ./dist/npm/darwin-arm64
          npm pack --dry-run ./dist/npm/win32-x64
          npm pack --dry-run ./dist/npm/win32-arm64
      - name: Publish platform packages
        run: |
          set -euo pipefail
          publish_if_missing() {
            package_dir="$1"
            package_name="$(node -p "require('./dist/npm/${package_dir}/package.json').name")"
            package_version="$(node -p "require('./dist/npm/${package_dir}/package.json').version")"
            if npm view "${package_name}@${package_version}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
              echo "Skipping ${package_name}@${package_version}; already published."
              return
            fi
            npm publish --access public --registry=https://registry.npmjs.org "./dist/npm/${package_dir}"
          }

          publish_if_missing linux-x64
          publish_if_missing linux-arm64
          publish_if_missing darwin-x64
          publish_if_missing darwin-arm64
          publish_if_missing win32-x64
          publish_if_missing win32-arm64
      - name: Publish npm package
        working-directory: npm
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "Skipping ${package_name}@${package_version}; already published."
            exit 0
          fi
          npm publish --access public --registry=https://registry.npmjs.org
